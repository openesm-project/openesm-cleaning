name: Push descriptives to openesm website

on:
  workflow_dispatch:

jobs:
  push-descriptives:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout openesm-cleaning
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout openesm website
        uses: actions/checkout@v4
        with:
          repository: openesm-project/openesm
          token: ${{ secrets.OPENESM_WEBSITE_PAT }}
          path: _website

      - name: Switch website repo to update branch
        working-directory: _website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin descriptives-data-update 2>/dev/null || true
          if git rev-parse --verify origin/descriptives-data-update &>/dev/null; then
            git checkout -B descriptives-data-update origin/descriptives-data-update
          else
            git checkout -B descriptives-data-update
          fi

      - name: Install website dependencies
        working-directory: _website
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi
          npm install --no-save @citation-js/core

      - name: Copy descriptives to website
        run: |
          mkdir -p _website/website/static/data/descriptives
          find _website/website/static/data/descriptives -type f -name '*.json' -delete
          for f in descriptives/output/*.json; do
            name="$(basename "$f")"
            [[ "$name" == "descriptives_index.json" ]] && continue
            [[ "$name" == "landing_stats.json" ]] && \
              cp "$f" _website/website/static/data/landing_stats.json && continue
            cp "$f" _website/website/static/data/descriptives/
          done

      - name: Regenerate website index and dataset pages
        working-directory: _website
        run: |
          [ -f scripts/generate_descriptives_index.js ] && node scripts/generate_descriptives_index.js || echo "generate_descriptives_index.js not found, skipping"
          [ -f scripts/generate_dataset_pages.js ] && node scripts/generate_dataset_pages.js || echo "generate_dataset_pages.js not found, skipping"

      - name: Commit and push to website branch
        working-directory: _website
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes — skipping PR"
            exit 0
          fi
          git commit -m "chore: update descriptives data"
          git push origin descriptives-data-update
        env:
          GITHUB_TOKEN: ${{ secrets.OPENESM_WEBSITE_PAT }}

      - name: Create or update pull request
        run: |
          BODY="## Automated descriptives update — Schema v1.0

          | Field | Value |
          |---|---|
          | Schema version | **1.0** (breaking change — see below) |
          | Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | Source commit | [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |

          ### Breaking schema changes from previous version
          The per-person row format has been replaced with fully precomputed aggregates.
          The frontend must be updated before merging.

          **New top-level fields per item:** \`n_included\`, \`n_excluded\`, \`excluded_reasons\`, \`empirical_scale_range\`, \`mode_counts\`

          **New \`stats\` object** (replaces per-person rows): one entry per statistic
          (\`mean\`, \`sd\`, \`skewness\`, \`prop_floor\`, \`prop_ceil\`), each containing
          \`median\`, \`iqr\`, and \`kde\` (100 {x,y} points).

          **New \`person_dots\`** (optional, only when n_included ≤ 150): raw per-participant
          values for individual-dot overlay on density plots.

          **Removed:** per-person \`person_stats\` array, \`kurtosis\`, \`dip_p\`.

          Statistical details are documented in the header of
          [compute_descriptives.R](https://github.com/${{ github.repository }}/blob/main/descriptives/compute_descriptives.R).

          **Please review the diff and confirm frontend compatibility before merging.**"

          PR=$(gh pr list --repo openesm-project/openesm \
                 --head descriptives-data-update --base main \
                 --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            echo "Updating existing PR #$PR"
            gh pr edit "$PR" --repo openesm-project/openesm --body "$BODY"
          else
            gh pr create \
              --repo openesm-project/openesm \
              --head descriptives-data-update \
              --base main \
              --title "chore: update descriptives data [automated]" \
              --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.OPENESM_WEBSITE_PAT }}

name: Push descriptives to openesm website

# Manual trigger only. Run compute_descriptives.R locally first, commit the
# output files, then trigger this workflow to open a PR on the website repo.
#
# Required secret: OPENESM_WEBSITE_PAT — PAT with `repo` scope on bsiepe/openesm
# (Settings → Secrets and variables → Actions → New repository secret)
on:
  workflow_dispatch:

jobs:
  push-descriptives:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout openesm-cleaning
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout openesm website
        uses: actions/checkout@v4
        with:
          repository: bsiepe/openesm
          token: ${{ secrets.OPENESM_WEBSITE_PAT }}
          path: _website

      - name: Install website dependencies
        working-directory: _website
        run: |
          if [ -f package.json ]; then
            npm install --no-save
          fi

      # Copy dataset JSON files; exclude the local index (website regenerates its own).
      - name: Copy descriptives to website
        run: |
          mkdir -p _website/website/static/data/descriptives
          for f in descriptives/output/*.json; do
            [[ "$(basename "$f")" == "descriptives_index.json" ]] && continue
            cp "$f" _website/website/static/data/descriptives/
          done

      - name: Regenerate website index and dataset pages
        working-directory: _website
        run: |
          [ -f scripts/generate_descriptives_index.js ] && node scripts/generate_descriptives_index.js || echo "generate_descriptives_index.js not found, skipping"
          [ -f scripts/generate_dataset_pages.js ] && node scripts/generate_dataset_pages.js || echo "generate_dataset_pages.js not found, skipping"

      - name: Commit and push to website branch
        working-directory: _website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B descriptives-data-update
          git add -A
          if git diff --staged --quiet; then
            echo "No changes — skipping PR"
            exit 0
          fi
          git commit -m "chore: update descriptives data"
          git push --force-with-lease origin descriptives-data-update
        env:
          GITHUB_TOKEN: ${{ secrets.OPENESM_WEBSITE_PAT }}

      - name: Create or update pull request
        run: |
          BODY="## Automated descriptives update

          | Field | Value |
          |---|---|
          | Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | Source commit | [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |

          JSON files were copied from \`descriptives/output/\` in openesm-cleaning.

          **Please review the diff before merging.**"

          PR=$(gh pr list --repo bsiepe/openesm \
                 --head descriptives-data-update --base main \
                 --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            echo "Updating existing PR #$PR"
            gh pr edit "$PR" --repo bsiepe/openesm --body "$BODY"
          else
            gh pr create \
              --repo bsiepe/openesm \
              --head descriptives-data-update \
              --base main \
              --title "chore: update descriptives data [automated]" \
              --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.OPENESM_WEBSITE_PAT }}
